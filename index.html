<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <main class="main-contet">
    <article class="blog-preview-card"> <!--shows up to th e screereader-->
      <div class="preview-card">

        <img class="image"  src="./assets/images/illustration-article.svg" alt="">

        <div class="text">
          <span class="category">
            Learning
          </span>

          <p>
            Published 21 Dec 2023
          </p>

          <h1>
            HTML & CSS foundations
          </h1>

          <p>
            These languages are the backbone of every website, defining structure, content, and presentation.
          </p>
        </div>

        <div class="author">
          <img src="./assets/images/image-avatar.webp" alt="">
          <span>
            Greg Hooper
          </span>
        </div>
      </div>

      <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
        Coded by <a href="https://www.frontendmentor.io/profile/ismael-dev1">Ismael</a>.
      </footer>
    </article>
  </main>
</body>

</html>
